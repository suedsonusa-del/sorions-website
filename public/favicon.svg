<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="20" fill="#1C1C1C" />
  <!-- Elegant geometric S shape in gold -->
  <path d="M 35 30 
           C 45 20, 65 20, 65 35 
           C 65 45, 35 45, 35 65 
           C 35 80, 55 80, 65 70" 
        fill="none" 
        stroke="#C8B89A" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  <!-- Outer accent line -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#C8B89A" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.4" />
</svg>